<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --serif:'DM Serif Display',serif;
  --sans:'DM Sans',sans-serif;
  --ink:#1a1a18;--ink2:#4a4a46;--ink3:#8a8a84;
  --bg:#fafaf8;--bg2:#f2f2ee;--bg3:#e8e8e2;
  --line:rgba(0,0,0,0.08);--line2:rgba(0,0,0,0.15);
  --accent:#2a6a4a;--accentL:#e8f3ed;
  --rsm:6px;--rmd:10px;--rlg:16px;
  --s1:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --s2:0 4px 16px rgba(0,0,0,0.08),0 2px 6px rgba(0,0,0,0.04);
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:var(--sans)}
::selection{background:var(--accentL);color:var(--accent)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:99px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(42,106,74,.25)}50%{box-shadow:0 0 0 6px rgba(42,106,74,.1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
@keyframes fadein{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:all .3s ease}
nav.scrolled{background:rgba(250,250,248,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:780px;margin:0 auto;padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--serif);font-size:18px;letter-spacing:-.3px}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:2rem}
.nav-links button{background:none;border:none;cursor:pointer;font-size:13px;color:var(--ink2);font-weight:400;transition:color .15s;padding:4px 0}
.nav-links button:hover{color:var(--ink)}
.nav-hire{font-size:13px;font-weight:500;padding:8px 18px;background:var(--ink);color:var(--bg);border-radius:var(--rsm);transition:opacity .15s;display:inline-block}
.nav-hire:hover{opacity:.8}
.wrap{max-width:780px;margin:0 auto;padding:0 1.5rem}
.label{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.label::before{content:'';display:block;width:24px;height:1px;background:var(--accent)}
.tag{font-size:11px;padding:3px 10px;border-radius:99px;background:var(--bg2);color:var(--ink2);border:1px solid var(--line)}
.tags{display:flex;gap:8px;flex-wrap:wrap}
/* HERO */
#hero{min-height:100vh;display:flex;align-items:center;padding:100px 1.5rem 60px;max-width:780px;margin:0 auto}
.hero-inner{width:100%;animation:fadein .8s ease both}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--accentL);color:var(--accent);border-radius:99px;padding:5px 14px;font-size:12px;font-weight:500;margin-bottom:1.75rem;border:1px solid rgba(42,106,74,.2)}
.badge-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite}
.hero-name{font-family:var(--serif);font-size:clamp(40px,8vw,66px);line-height:1.05;letter-spacing:-1.5px;margin-bottom:1rem}
.hero-name em{font-style:italic;color:var(--ink2)}
.role-line{font-size:clamp(15px,2.5vw,21px);font-weight:300;color:var(--ink2);margin-bottom:1.5rem;min-height:34px;display:flex;align-items:center;gap:10px}
.role-text{color:var(--accent);font-weight:500;transition:all .35s ease}
.hero-bio{font-size:15px;line-height:1.85;color:var(--ink2);max-width:540px;margin-bottom:2.5rem}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:3rem}
.btn-dark{background:var(--ink);color:var(--bg);border:none;border-radius:var(--rsm);padding:12px 24px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-dark:hover{opacity:.8}
.btn-outline{background:transparent;color:var(--ink);border:1px solid var(--line2);border-radius:var(--rsm);padding:12px 24px;font-size:14px;font-weight:500;transition:background .15s;display:inline-block}
.btn-outline:hover{background:var(--bg2)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 12px;border-radius:99px;background:var(--bg2);color:var(--ink2);border:1px solid var(--line)}
.scroll-hint{margin-top:4rem;display:flex;align-items:center;gap:10px;color:var(--ink3);font-size:12px}
.scroll-hint span{animation:bounce 2s ease-in-out infinite}
/* ABOUT */
#about{padding:6rem 1.5rem;max-width:780px;margin:0 auto}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
.about-h{font-family:var(--serif);font-size:34px;line-height:1.15;letter-spacing:-.5px;margin-bottom:1.5rem}
.about-h em{font-style:italic;color:var(--ink2)}
.about-p{font-size:15px;line-height:1.85;color:var(--ink2);margin-bottom:1rem}
.edu-card{background:var(--bg2);border-radius:var(--rmd);padding:1rem 1.25rem;border-left:3px solid var(--accent)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-card{background:var(--bg);border:1px solid var(--line);border-radius:var(--rmd);padding:1.25rem;box-shadow:var(--s1)}
.stat-num{font-family:var(--serif);font-size:34px;letter-spacing:-1px;line-height:1;margin-bottom:6px}
.stat-lbl{font-size:12px;color:var(--ink3);line-height:1.5}
/* EXPERIENCE */
#experience{padding:6rem 1.5rem;background:var(--bg2)}
.exp-grid{display:grid;grid-template-columns:250px 1fr;gap:2rem}
.exp-list{display:flex;flex-direction:column;gap:4px}
.exp-btn{text-align:left;border-radius:var(--rmd);padding:12px 14px;cursor:pointer;transition:all .15s;border:1px solid transparent;background:transparent}
.exp-btn.active{background:var(--bg);border-color:var(--line);box-shadow:var(--s1)}
.exp-btn-role{font-size:13px;margin-bottom:2px;color:var(--ink2)}
.exp-btn.active .exp-btn-role{font-weight:500;color:var(--ink)}
.exp-btn-org{font-size:11px;color:var(--ink3)}
.exp-detail{background:var(--bg);border:1px solid var(--line);border-radius:var(--rlg);padding:2rem;box-shadow:var(--s1)}
.exp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
.exp-date{font-size:11px;color:var(--ink3);margin-bottom:4px}
.exp-role{font-size:20px;font-family:var(--serif);font-weight:400;margin-bottom:4px}
.exp-org{font-size:14px;color:var(--ink2)}
.type-badge{font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;white-space:nowrap}
.exp-desc{font-size:14px;line-height:1.8;color:var(--ink2);margin:1rem 0 1.5rem}
/* PROJECTS */
#projects{padding:6rem 1.5rem;max-width:780px;margin:0 auto}
.proj-card{background:var(--bg);border:1px solid var(--line);border-radius:var(--rlg);padding:2rem;box-shadow:var(--s1);transition:all .2s ease;margin-bottom:20px;position:relative;overflow:hidden}
.proj-card:hover{border-color:var(--line2);box-shadow:var(--s2);transform:translateY(-2px)}
.proj-inner{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.proj-icon{width:44px;height:44px;border-radius:var(--rmd);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:1rem}
.proj-title{font-size:18px;font-family:var(--serif);font-weight:400}
.proj-sub{font-size:12px;color:var(--ink3);margin-bottom:1rem}
.proj-desc{font-size:14px;line-height:1.8;color:var(--ink2);margin-bottom:1.25rem}
.featured-badge{position:absolute;top:20px;right:20px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;background:var(--accentL);color:var(--accent);border:1px solid rgba(42,106,74,.2)}
.info-box{background:var(--bg2);border-radius:var(--rmd);padding:1rem 1.25rem;margin-bottom:16px}
.info-lbl{font-size:11px;color:var(--ink3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.impact-box{background:var(--accentL);border-radius:var(--rmd);padding:1rem 1.25rem;border-left:3px solid var(--accent)}
.impact-lbl{font-size:11px;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
/* SKILLS */
#skills{padding:6rem 1.5rem;background:var(--bg2)}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:16px}
.skill-card{background:var(--bg);border:1px solid var(--line);border-radius:var(--rlg);padding:1.5rem;box-shadow:var(--s1);transition:box-shadow .2s}
.skill-card:hover{box-shadow:var(--s2)}
.skill-icon{font-size:24px;margin-bottom:.75rem}
.skill-name{font-size:13px;font-weight:500;margin-bottom:.75rem}
.skill-bar{height:3px;background:var(--bg3);border-radius:99px;margin-bottom:1rem;overflow:hidden}
.skill-fill{height:100%;background:var(--accent);border-radius:99px}
.skill-item{font-size:12px;color:var(--ink2);line-height:1.6}
.soft-bar{background:var(--bg);border:1px solid var(--line);border-radius:var(--rlg);padding:1.5rem 2rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
.soft-lbl{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);white-space:nowrap}
.soft-item{font-size:13px;color:var(--ink2);display:flex;align-items:center;gap:6px}
.soft-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block}
/* BLOG */
#blog{padding:6rem 1.5rem;max-width:780px;margin:0 auto}
.event-card{display:grid;grid-template-columns:1fr auto;background:var(--bg);border:1px solid var(--line);border-radius:var(--rlg);padding:1.5rem 1.75rem;box-shadow:var(--s1);gap:1rem;align-items:center;transition:all .2s;margin-bottom:16px}
.event-card:hover{border-color:var(--line2);box-shadow:var(--s2)}
.event-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.event-title{font-size:15px;font-weight:500}
.event-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px}
.event-desc{font-size:13px;color:var(--ink2);line-height:1.7}
.event-meta{font-size:11px;color:var(--ink3);margin-top:8px}
/* CONTACT */
#contact{padding:6rem 1.5rem;background:var(--ink)}
.contact-title{font-family:var(--serif);font-size:clamp(34px,7vw,58px);color:#fff;line-height:1.1;letter-spacing:-1px;margin-bottom:1.5rem}
.contact-title em{font-style:italic;color:rgba(255,255,255,.5)}
.contact-bio{font-size:15px;color:rgba(255,255,255,.6);max-width:480px;margin:0 auto 2.5rem;line-height:1.8}
.contact-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:4rem}
.contact-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:var(--rlg);padding:1.5rem}
.contact-icon{font-size:20px;margin-bottom:12px}
.contact-lbl{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.contact-val{font-size:13px;color:rgba(255,255,255,.85);line-height:1.6}
.copy-btn{margin-top:12px;font-size:11px;padding:4px 12px;border-radius:99px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);cursor:pointer;font-family:var(--sans)}
.refs-section{border-top:1px solid rgba(255,255,255,.1);padding-top:2.5rem}
.refs-title{font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-bottom:1.5rem}
.refs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.ref-name{font-size:13px;font-weight:500;color:rgba(255,255,255,.85);margin-bottom:2px}
.ref-title{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:2px}
.ref-org{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:4px}
.ref-contact{font-size:11px;color:rgba(255,255,255,.45)}
.footer{border-top:1px solid rgba(255,255,255,.08);margin-top:3rem;padding-top:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer p{font-size:12px;color:rgba(255,255,255,.3)}
@media(max-width:640px){
  .nav-links{display:none}
  .about-grid,.exp-grid,.proj-inner,.contact-cards,.refs-grid,.stats-grid{grid-template-columns:1fr!important}
}
</style>
</head>

function Navbar() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const go = id => document.getElementById(id) && document.getElementById(id).scrollIntoView({behavior:'smooth'});
  return (
    <nav className={scrolled ? 'scrolled' : ''}>
      <div className="nav-inner">
        <span className="nav-logo">JN<span>.</span></span>
        <div className="nav-links">
          {['about','experience','projects','skills','blog','contact'].map(s => (
            <button key={s} onClick={() => go(s)}>{s.charAt(0).toUpperCase()+s.slice(1)}</button>
          ))}
        </div>
        <a className="nav-hire" href="mailto:hofilenanicole1@gmail.com">Hire me</a>
      </div>
    </nav>
  );
}
